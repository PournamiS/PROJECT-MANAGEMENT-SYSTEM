{% extends 'base.html' %}
{% block title %}Delete {{ type }} — PMS{% endblock %}
{% block page_title %}Delete {{ type }}{% endblock %}

{% block content %}
<div class="page-card" style="max-width:460px;">
  <div class="p-5 text-center">
    <div style="width:64px; height:64px; background:#fee2e2; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 16px;">
      <i class="bi bi-exclamation-triangle text-danger fs-4"></i>
    </div>
    <h5 class="fw-bold mb-2">Delete {{ type }}</h5>
    <p class="text-muted mb-4" style="font-size:14px;">
      Are you sure you want to delete <strong>{{ object }}</strong>?<br>
      This action cannot be undone.
    </p>
    <form method="post" class="d-flex gap-2 justify-content-center">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, delete</button>
      <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
