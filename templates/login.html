<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Project Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 18px; padding: 48px 40px; width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }
    .brand-icon { width: 56px; height: 56px; border-radius: 14px; background: #6366f1; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="brand-icon"><i class="bi bi-kanban-fill text-white fs-4"></i></div>
      <h5 class="fw-bold mb-1">Project Management System</h5>
      <p class="text-muted" style="font-size:14px;">Sign in to your account</p>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger py-2" style="font-size:14px;">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold" style="font-size:14px;">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold" style="font-size:14px;">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100" style="background:#6366f1; border-color:#6366f1;">
        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
      </button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
